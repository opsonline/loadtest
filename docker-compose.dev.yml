version: '3.8'

services:
  db:
    image: postgres:14
    container_name: loadtest_dev_db
    environment:
      POSTGRES_DB: loadtest_dev
      POSTGRES_USER: loadtest_user
      POSTGRES_PASSWORD: loadtest_password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # 使用不同端口避免冲突

  redis:
    image: redis:7-alpine
    container_name: loadtest_dev_redis
    ports:
      - "6380:6379"  # 使用不同端口避免冲突
    volumes:
      - redis_dev_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: loadtest_dev_backend
    depends_on:
      - db
      - redis
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - DATABASE_URL=postgresql://loadtest_user:loadtest_password@db:5432/loadtest_dev
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_dev_data:/app/uploads
    command: >
      sh -c "python manage.py migrate &&
              python manage.py collectstatic --noinput &&
              python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: loadtest_dev_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

volumes:
  postgres_dev_data:
  redis_dev_data:
  media_dev_data: