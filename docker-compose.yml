version: '3.8'

services:
  db:
    image: postgres:14
    container_name: loadtest_db
    environment:
      POSTGRES_DB: loadtest
      POSTGRES_USER: loadtest_user
      POSTGRES_PASSWORD: loadtest_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: loadtest_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loadtest_backend
    depends_on:
      - db
      - redis
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DATABASE_URL=postgresql://loadtest_user:loadtest_password@db:5432/loadtest
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loadtest_frontend
    depends_on:
      - backend
    ports:
      - "80:80"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loadtest_celery_worker
    command: celery -A config worker -l info
    depends_on:
      - db
      - redis
      - backend
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DATABASE_URL=postgresql://loadtest_user:loadtest_password@db:5432/loadtest
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - media_data:/app/uploads

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loadtest_celery_beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - db
      - redis
      - backend
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DATABASE_URL=postgresql://loadtest_user:loadtest_password@db:5432/loadtest
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - media_data:/app/uploads

volumes:
  postgres_data:
  redis_data:
  media_data: